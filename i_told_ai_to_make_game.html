<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Highway Chase - Neon Racing Game</title>
    <style>

<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="stat"><span>🏆 SCORE</span> <span id="scoreValue">0</span></div>
                <div class="stat"><span>⚡ SPEED</span> <span id="speedValue">5</span></div>
                <div class="stat"><span>🏅 BEST</span> <span id="highScoreValue">0</span></div>
            </div>
        </div>
        <div class="controls">
            <button id="restartButton">🔄 RESTART</button>
            <div class="touch-buttons">
                <div class="touch-btn" id="leftTouchBtn">◀ LEFT</div>
                <div class="touch-btn" id="rightTouchBtn">RIGHT ▶</div>
            </div>
        </div>
        <div class="instruction">
            🎮 ARROWS  or  A/D  |  Touch buttons for mobile  |  avoid red cars  |  press R to restart
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- GAME DIMENSIONS ----------
        const W = 800, H = 600;
        // car dimensions
        const CAR_W = 42;
        const CAR_H = 68;
        // road boundaries
        const ROAD_MIN_X = 60;
        const ROAD_MAX_X = W - CAR_W - 60;
        const ROAD_WIDTH = ROAD_MAX_X - ROAD_MIN_X;
        
        // ---------- PLAYER ----------
        let player = {
            x: (W/2) - CAR_W/2,
            y: H - CAR_H - 15,
            width: CAR_W,
            height: CAR_H
        };
        // Clamp initial position
        player.x = Math.min(ROAD_MAX_X, Math.max(ROAD_MIN_X, player.x));
        
        // ---------- GAME STATE ----------
        let playing = true;          // true = race active, false = game over
        let score = 0;
        let highScore = 0;
        let currentSpeed = 5.0;      // base moving speed (obstacles & scroll)
        const BASE_SPEED = 5;
        const MAX_SPEED = 12.5;
        
        // obstacles array
        let obstacles = [];
        
        // spawn timer
        let spawnCooldown = 0;
        
        // road scroll effect offset
        let roadScrollY = 0;
        
        // control flags
        let leftPressed = false;
        let rightPressed = false;
        const PLAYER_SPEED = 7.2;    // lateral movement speed
        
        // dynamic difficulty: speed increments every X points
        let lastScoreThreshold = 0;
        
        // ---------- HELPER FUNCTIONS ----------
        function updateHighScoreUI() {
            document.getElementById('highScoreValue').innerText = highScore;
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }
        
        function updateSpeedUI() {
            document.getElementById('speedValue').innerText = currentSpeed.toFixed(1);
        }
        
        // load highscore from localStorage
        function loadHighScore() {
            let saved = localStorage.getItem('racingHighScore');
            if(saved && !isNaN(parseInt(saved))) {
                highScore = parseInt(saved);
            } else {
                highScore = 0;
            }
            updateHighScoreUI();
        }
        
        function saveHighScore() {
            if(score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('racingHighScore', highScore);
                updateHighScoreUI();
            }
        }
        
        // adjust game speed based on score
        function updateGameSpeed() {
            // every 120 points -> +0.7 speed, but smooth
            let increment = Math.floor(score / 110);
            let newSpeed = BASE_SPEED + (increment * 0.75);
            currentSpeed = Math.min(MAX_SPEED, newSpeed);
            updateSpeedUI();
        }
        
        // spawn new opponent car
        function spawnObstacle() {
            let randX = ROAD_MIN_X + Math.random() * (ROAD_MAX_X - ROAD_MIN_X);
            // keep within integer pixels
            randX = Math.min(ROAD_MAX_X, Math.max(ROAD_MIN_X, randX));
            obstacles.push({
                x: randX,
                y: -CAR_H - Math.random() * 40,
                width: CAR_W,
                height: CAR_H,
                color: `hsl(${Math.floor(Math.random() * 20 + 0)}, 85%, 52%)` // red / crimson variations
            });
        }
        
        // dynamic spawn delay: faster = more traffic
        function getSpawnDelay() {
            let delay = Math.max(28, 65 - Math.floor(currentSpeed * 2.5));
            return Math.floor(delay);
        }
        
        // reset full game
        function resetGame() {
            playing = true;
            score = 0;
            currentSpeed = BASE_SPEED;
            obstacles = [];
            player.x = (W/2) - CAR_W/2;
            player.x = Math.min(ROAD_MAX_X, Math.max(ROAD_MIN_X, player.x));
            updateScoreUI();
            updateSpeedUI();
            // reset spawn timer
            spawnCooldown = 12;   // quick first car
            roadScrollY = 0;
            lastScoreThreshold = 0;
            leftPressed = false;
            rightPressed = false;
        }
        
        // collision detection AABB
        function checkCollision(playerRect, obsRect) {
            return (playerRect.x < obsRect.x + obsRect.w &&
                    playerRect.x + playerRect.w > obsRect.x &&
                    playerRect.y < obsRect.y + obsRect.h &&
                    playerRect.y + playerRect.h > obsRect.y);
        }
        
        // update game logic (only when playing)
        function updateGame() {
            if(!playing) return;
            
            // 1. move player (left/right)
            let move = 0;
            if(leftPressed) move = -PLAYER_SPEED;
            if(rightPressed) move = PLAYER_SPEED;
            if(move !== 0) {
                let newX = player.x + move;
                if(newX >= ROAD_MIN_X && newX <= ROAD_MAX_X) {
                    player.x = newX;
                } else {
                    // edge collision snap
                    if(newX < ROAD_MIN_X) player.x = ROAD_MIN_X;
                    if(newX > ROAD_MAX_X) player.x = ROAD_MAX_X;
                }
            }
            
            // 2. obstacles movement & score collection (passed obstacles)
            let newObstacles = [];
            let passedCount = 0;
            for(let obs of obstacles) {
                obs.y += currentSpeed;
                if(obs.y > H) {
                    // car passed safely -> increase score
                    passedCount++;
                    continue;
                }
                newObstacles.push(obs);
            }
            obstacles = newObstacles;
            
            // increase score based on passed cars (each = 10 points)
            if(passedCount > 0) {
                let gained = passedCount * 12;
                score += gained;
                updateScoreUI();
                // update difficulty & speed dynamically
                updateGameSpeed();
                saveHighScore();
            }
            
            // 3. collision detection (after moving)
            const playerRect = {
                x: player.x,
                y: player.y,
                w: CAR_W,
                h: CAR_H
            };
            for(let obs of obstacles) {
                const obsRect = {
                    x: obs.x,
                    y: obs.y,
                    w: CAR_W,
                    h: CAR_H
                };
                if(checkCollision(playerRect, obsRect)) {
                    playing = false;   // GAME OVER
                    saveHighScore();    // ensure final score recorded
                    break;
                }
            }
            
            // 4. spawn new obstacles with dynamic cooldown
            if(spawnCooldown <= 0 && playing) {
                spawnObstacle();
                let delay = getSpawnDelay();
                // add little randomness to avoid clumping
                delay += Math.floor(Math.random() * 12) - 3;
                spawnCooldown = Math.max(24, delay);
            } else {
                if(spawnCooldown > 0) spawnCooldown--;
            }
            
            // 5. scroll offset for road animation
            roadScrollY = (roadScrollY + currentSpeed * 1.2) % 80;
        }
        
        // ---------- DRAWING (NEON / HIGHWAY STYLE) ----------
        function drawRoad() {
            // asphalt gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#101820');
            grad.addColorStop(1, '#1e2a2e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            // road base (dark tarmac)
            ctx.fillStyle = '#171f24';
            ctx.shadowBlur = 0;
            ctx.fillRect(ROAD_MIN_X - 8, 0, ROAD_WIDTH + 16, H);
            ctx.fillStyle = '#1e2c32';
            ctx.fillRect(ROAD_MIN_X - 4, 0, ROAD_WIDTH + 8, H);
            ctx.fillStyle = '#0d1419';
            ctx.fillRect(ROAD_MIN_X, 0, ROAD_WIDTH, H);
            
            // edge glow (neon)
            ctx.beginPath();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#0ff8';
            ctx.setLineDash([12, 20]);
            ctx.strokeRect(ROAD_MIN_X - 2, 5, ROAD_WIDTH + 4, H-10);
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#0fa0ff';
            ctx.strokeRect(ROAD_MIN_X - 1, 3, ROAD_WIDTH + 2, H-6);
            
            // lane markings (moving dashed lines)
            const lane1X = ROAD_MIN_X + ROAD_WIDTH * 0.33;
            const lane2X = ROAD_MIN_X + ROAD_WIDTH * 0.66;
            const dashHeight = 32;
            const dashSpace = 48;
            const offset = roadScrollY % dashSpace;
            
            ctx.fillStyle = '#b5ffff';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#0ff';
            for(let y = -dashHeight; y < H + dashHeight; y += dashSpace) {
                let yPos = y + offset;
                // lane 1
                ctx.fillRect(lane1X - 4, yPos, 8, dashHeight);
                // lane 2
                ctx.fillRect(lane2X - 4, yPos, 8, dashHeight);
            }
            ctx.shadowBlur = 0;
            
            // road reflectors (tiny)
            ctx.fillStyle = '#f4d03f';
            for(let i = 0; i < 12; i++) {
                let refY = (roadScrollY * 1.8 + i * 70) % H;
                ctx.fillRect(ROAD_MIN_X + 10, refY, 4, 8);
                ctx.fillRect(ROAD_MAX_X + CAR_W - 14, refY, 4, 8);
            }
        }
        
        function drawPlayerCar() {
            const x = player.x;
            const y = player.y;
            // body gradient
            const grad = ctx.createLinearGradient(x, y, x+CAR_W, y+CAR_H);
            grad.addColorStop(0, '#2ad4ff');
            grad.addColorStop(1, '#0077be');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0af';
            ctx.beginPath();
            ctx.roundRect(x, y, CAR_W, CAR_H, 12);
            ctx.fill();
            // windows
            ctx.fillStyle = '#aaf0ff';
            ctx.beginPath();
            ctx.roundRect(x+6, y+8, CAR_W-12, 20, 8);
            ctx.fill();
            ctx.fillStyle = '#1e2f5a';
            ctx.beginPath();
            ctx.roundRect(x+8, y+32, CAR_W-16, 18, 6);
            ctx.fill();
            // neon headlights
            ctx.fillStyle = '#ffff90';
            ctx.shadowBlur = 12;
            ctx.fillRect(x+4, y+CAR_H-12, 8, 8);
            ctx.fillRect(x+CAR_W-12, y+CAR_H-12, 8, 8);
            ctx.fillStyle = '#ffaa33';
            ctx.fillRect(x+2, y+4, 6, 6);
            ctx.fillRect(x+CAR_W-8, y+4, 6, 6);
            ctx.shadowBlur = 0;
            // racing stripes
            ctx.fillStyle = '#c0e0ff';
            ctx.fillRect(x+12, y+CAR_H-20, 6, 12);
            ctx.fillRect(x+CAR_W-18, y+CAR_H-20, 6, 12);
        }
        
        function drawOpponentCar(obs) {
            const x = obs.x;
            const y = obs.y;
            const grad = ctx.createLinearGradient(x, y, x+CAR_W, y+CAR_H);
            grad.addColorStop(0, '#e34d4d');
            grad.addColorStop(1, '#a12222');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#f004';
            ctx.beginPath();
            ctx.roundRect(x, y, CAR_W, CAR_H, 12);
            ctx.fill();
            // dark windows
            ctx.fillStyle = '#2f2222';
            ctx.beginPath();
            ctx.roundRect(x+6, y+8, CAR_W-12, 20, 8);
            ctx.fill();
            ctx.fillStyle = '#c92f2f';
            ctx.fillRect(x+10, y+40, 8, 12);
            ctx.fillRect(x+CAR_W-18, y+40, 8, 12);
            // red glare
            ctx.fillStyle = '#ff6666';
            ctx.fillRect(x+4, y+CAR_H-12, 6, 6);
            ctx.fillRect(x+CAR_W-10, y+CAR_H-12, 6, 6);
            ctx.shadowBlur = 0;
        }
        
        function drawGameUI() {
            // score on canvas extra glow
            ctx.font = 'bold 28px "Orbitron", monospace';
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#0ffff0';
            ctx.shadowColor = '#0ff';
            ctx.fillText(`⚡${Math.floor(score)}`, 30, 60);
            ctx.font = 'bold 18px monospace';
            ctx.fillStyle = '#b0f0ff';
            ctx.fillText(`SPEED: ${currentSpeed.toFixed(1)}`, W-140, 50);
            if(!playing) {
                ctx.font = '800 42px "Orbitron", monospace';
                ctx.fillStyle = '#ff2266';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff0080';
                ctx.fillText('GAME OVER', W/2-140, H/2-50);
                ctx.font = 'bold 22px monospace';
                ctx.fillStyle = '#ffaa88';
                ctx.fillText('press RESTART or [R]', W/2-125, H/2+30);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#ddddff';
                ctx.fillText('tap RESTART to race again', W/2-105, H/2+80);
            }
            ctx.shadowBlur = 0;
        }
        
        // roundRect utility
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function draw() {
            drawRoad();
            // draw obstacles
            for(let obs of obstacles) {
                drawOpponentCar(obs);
            }
            drawPlayerCar();
            drawGameUI();
            // extra road glow
            ctx.beginPath();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#0ff880';
            ctx.setLineDash([8, 28]);
            ctx.strokeRect(ROAD_MIN_X, 0, ROAD_WIDTH, H);
            ctx.setLineDash([]);
        }
        
        // ---------- GAME LOOP (ANIMATION) ----------
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ---------- EVENT HANDLERS (keyboard + touch) ----------
        function handleKeyDown(e) {
            const key = e.key;
            if(key === 'ArrowLeft' || key === 'a' || key === 'A') {
                leftPressed = true;
                e.preventDefault();
            } else if(key === 'ArrowRight' || key === 'd' || key === 'D') {
                rightPressed = true;
                e.preventDefault();
            } else if(key === 'r' || key === 'R') {
                e.preventDefault();
                resetGame();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if(key === 'ArrowLeft' || key === 'a' || key === 'A') {
                leftPressed = false;
                e.preventDefault();
            } else if(key === 'ArrowRight' || key === 'd' || key === 'D') {
                rightPressed = false;
                e.preventDefault();
            }
        }
        
        // touch buttons logic (simulate press)
        const leftBtn = document.getElementById('leftTouchBtn');
        const rightBtn = document.getElementById('rightTouchBtn');
        const restartBtn = document.getElementById('restartButton');
        
        function attachTouchButton(btn, isLeft) {
            const startPress = (e) => {
                e.preventDefault();
                if(isLeft) leftPressed = true;
                else rightPressed = true;
            };
            const endPress = (e) => {
                e.preventDefault();
                if(isLeft) leftPressed = false;
                else rightPressed = false;
            };
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
            btn.addEventListener('touchstart', startPress, {passive: false});
            btn.addEventListener('touchend', endPress, {passive: false});
            btn.addEventListener('touchcancel', endPress);
        }
        
        attachTouchButton(leftBtn, true);
        attachTouchButton(rightBtn, false);
        
        restartBtn.addEventListener('click', (e) => {
            resetGame();
        });
        
        // also prevent window arrow scrolling
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // disable context menu and touch drag on canvas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('touchmove', (e) => { if(e.target === canvas) e.preventDefault(); }, {passive: false});
        
        // ---------- INITIALIZE GAME ----------
        function init() {
            loadHighScore();
            resetGame();
            // start with 2 obstacles for some action? but safe - no, just initial empty
            spawnCooldown = 18;
            playing = true;
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
